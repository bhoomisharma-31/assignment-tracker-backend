name: Backend Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Clone repo if not present
            if [ ! -d "$HOME/assignment-tracker-backend" ]; then
              git clone https://github.com/bhoomisharma-31/assignment-tracker-backend.git $HOME/assignment-tracker-backend
            fi

            cd $HOME/assignment-tracker-backend

            git fetch origin
            git reset --hard origin/main

            # Install Python
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip python3-venv

            # Create virtual environment
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            # Stop old Flask server (don't kill this SSH session)
            pkill -f "python3 app.py" || true

            # Start Flask in background
            nohup python3 app.py > output.log 2>&1 < /dev/null &

            sleep 5

            echo "Backend deployed successfully!"